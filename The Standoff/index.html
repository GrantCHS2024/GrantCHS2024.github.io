<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>The Standoff</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://code.jquery.com/jquery-3.1.0.js"></script>
  <link rel="icon" href="Sprites/backgrounds/mini logo.png" type="image/x-icon">

  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik+Burned&family=Tiny5&display=swap" rel="stylesheet">
</head>
<body>
  <img class="helicopter" src="Sprites/vehicles/Helicopter.png">
  <div class="controls"><img src="Standoff controls.png"></div>

  <div class="intro"><video src="Videos/The Standoff Intro.mp4" autoplay></video><h1>Press SPACE to skip</h1></div>

  <div class="leaveNotification">Leave?:&emsp;Yes<img src="Sprites/btn1.png"> No<img src="Sprites/btn2.png"></div>
  <div class="controllerNotification"><img src="Sprites/37942.png"><h1>Controller Connected!</h1></div>

  <!--   MENU   -->
  <div class="menu"> 
    <img src="Sprites/Logos/Standoff Logo.png" class="logo">
    <div class="local">Classic</div>
    <div class="campaign">Campaign</div>
    <div class="battle">Battle Front</div>
    <div class="settingsOption">Settings</div>
    <img class="background">
  </div>

  <div class="settings">
    <div class="ambienceAudio"><h1>Ambience Volume</h1><input id="ambienceAudio" type="range" step="0.1" min="0" max="1" value="0.2"></input></div>
    <div class="effectsAudio"><h1>Effects Volume</h1><input id="effectsAudio" type="range" step="0.1" min="0" max="1" value="0.3"></input></div>
    <div class="bloodChoice"><h1>Blood</h1><input id="bloodChoice" type="checkbox" checked style="width: 50px;"></input></div>
    <div class="controlSetting"><h1>Controls</h1></div>
  </div>

  <div class="loadoutScreen">
    <div class="p1">
      <div class="sidebar">
        <div class="description"></div>
      </div>
    </div>
    <div class="p2"></div>
  </div>

  <!--GAME-->

  <div class="hud">
    <div class="time"></div>
    <div class="playerOneHealth"><img src="Sprites/monitor.gif"></div>
    <div class="playerTwoHealth"><img src="Sprites/monitor.gif"></div>
  </div>

  <img class="map">

  <div class="canvas">
    <canvas id="canvas"></canvas>
  </div>

  <img class="coverMap">

  <canvas id="canvashud"></canvas>

  <div class="transition"></div>
  <div class="transitiontwo"></div>
  <div class="score">
    <div class="playerOne">0</div>
    <div class="playerTwo">0</div>
  </div>

  <script src="js files/data.js"></script>
  <script src="js files/load.js"></script>
  <script src="js files/index.js"></script>
</body>
</html>
